tun:
  enable: true
  stack: "system"
  device: "utun0"
  auto-route: true
  auto-detect-interface: true
  strict-route: true
mode: "rule"
external-controller: "127.0.0.1:9090"
external-ui: "./metacubexd"
allow-lan: false
log-level: "silent"
ipv6: true
disable-keep-alive: true
unified-delay: true
tcp-concurrent: true
geodata-loader: "memconservative"
dns:
  enable: true
  cache-algorithm: "lru"
  prefer-h3: false
  listen: "0.0.0.0:1053"
  ipv6: true
  enhanced-mode: "fake-ip"
  fake-ip-range: "198.18.0.1/16"
  fake-ip-filter-mode: "blacklist"
  fake-ip-filter:
    - "geosite:cn"
    - "geosite:geolocation-cn"
    - "geosite:private"
  use-hosts: false
  use-system-hosts: true
  respect-rules: true
  default-nameserver:
    - "tls://1.12.12.12:853"
    - "tls://223.5.5.5:853"
  proxy-server-nameserver:
    - "https://dns.alidns.com/dns-query"
    - "https://dns.pub/dns-query"
  nameserver-policy:
    geosite:cn,geolocation-cn,private:
      - "tls://1.12.12.12:853"
      - "tls://223.5.5.5:853"
  nameserver:
    - "https://dns.cloudflare.com/dns-query"
    - "https://dns.google/dns-query"
rules:
  - "IP-CIDR,0.0.0.0/32,REJECT"
  - "DOMAIN-REGEX,^ad\\..*,REJECT"
  - "DOMAIN-REGEX,.*\\.ad\\..*,REJECT"
  - "GEOSITE,category-ads-all,REJECT"
  - "DOMAIN-KEYWORD,teracloud,⚡自动选择⚡"
  - "GEOSITE,cn,DIRECT"
  - "GEOSITE,geolocation-cn,DIRECT"
  - "GEOSITE,private,DIRECT"
  - "GEOIP,cn,DIRECT"
  - "GEOIP,private,DIRECT"
  - "GEOSITE,CATEGORY-AI-!CN,🧠人工智能🧠"
  - "GEOSITE,DLSITE,🇯🇵日本网站🇯🇵"
  - "DOMAIN,rss.4evergr8.workers.dev,🇯🇵日本网站🇯🇵"
  - "DOMAIN-SUFFIX,jp,🇯🇵日本网站🇯🇵"
  - "GEOSITE,category-cryptocurrency,🪙加密货币🪙"
  - "GEOSITE,youtube,🌍国外媒体🌍"
  - "MATCH,⚡自动选择⚡"
proxy-groups:
  - name: "⚡自动选择⚡"
    type: "url-test"
    url: "https://web.telegram.org"
    exclude-filter: "订阅|到期|官网|剩余|RU|俄罗斯|🇷🇺|KR|韩国|🇰🇷"
